name: Zafe Cron Jobs

on:
  schedule:
    - cron: "0 * * * *"    # a cada hora
    - cron: "0 11 * * *"   # 8h Brasília (11:00 UTC) — news agent
  workflow_dispatch:        # permite rodar manualmente

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Fechar mercados expirados + snapshots
        run: |
          curl -s -X POST https://zafe-rho.vercel.app/api/cron/fechar-mercados \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Resolver oracle
        run: |
          curl -s -X POST https://zafe-rho.vercel.app/api/cron/resolver-oracle \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Timeout apostas privadas
        run: |
          curl -s -X POST https://zafe-rho.vercel.app/api/cron/apostas-privadas-timeout \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

      - name: Repor mercados públicos
        run: |
          curl -s https://zafe-rho.vercel.app/api/cron/repor-mercados \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  news-agent:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Agente de notícias → tópicos pendentes
        run: |
          curl -s -X POST https://zafe-rho.vercel.app/api/cron/news-agent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  bonus-semanal:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && contains(fromJSON('["0","1","2","3","4","5","6"]'), format('{0}', github.run_number)))
    steps:
      - name: Check if Monday 9h UTC
        id: check
        run: |
          DAY=$(date -u +%u)   # 1=Mon ... 7=Sun
          HOUR=$(date -u +%H)
          if [ "$DAY" = "1" ] && [ "$HOUR" = "09" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Bônus semanal (+Z$200 para todos)
        if: steps.check.outputs.run == 'true'
        run: |
          curl -s -X POST https://zafe-rho.vercel.app/api/cron/bonus-semanal \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
