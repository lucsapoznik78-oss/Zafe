<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark circle background -->
  <circle cx="50" cy="50" r="50" fill="#1B1636"/>
  <!-- Trend line behind Z -->
  <polyline points="15,62 38,45 62,55 85,38" stroke="#7C5CFC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  <!-- Z letter -->
  <g fill="none" stroke="#7C5CFC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="28" y1="30" x2="72" y2="30"/>
    <line x1="72" y1="30" x2="28" y2="70"/>
    <line x1="28" y1="70" x2="72" y2="70"/>
  </g>
  <!-- Small dot on trend line -->
  <circle cx="85" cy="38" r="3.5" fill="#7C5CFC"/>
</svg>
